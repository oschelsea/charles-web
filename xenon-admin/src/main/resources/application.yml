# 项目相关配置
app:
  # 名称
  name: charles
  # 版本
  version: 1.0.0
  # 版权年份
  copyrightYear: 2025
  # 实例演示开关
  demoEnabled: true
  # 文件路径 示例（ Windows配置D:/app/data，Linux配置 /home/app/data）
  profile: data
  # 远程获取ip地址开关
  addressEnabled: false
  # 数据库类型: sqlite 或 postgresql
  database:
    type: sqlite
    name: charles
    # host: 127.0.0.1
    # port: 5432

captcha:
  # 是否启用验证码校验
  enable: true
  # 验证码类型 math 数组计算 char 字符验证
  type: MATH
  # line 线段干扰 circle 圆圈干扰 shear 扭曲干扰
  category: CIRCLE
  # 数字验证码位数
  numberLength: 1
  # 字符验证码长度
  charLength: 4

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /

# 日志配置
logging:
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss.SSS
  file:
    name: logs/app
  level:
    root: info
  config: classpath:logback/logback-default.xml

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  mvc:
    static-path-pattern: /static/**
  web:
    resources:
      static-locations: classpath:/static/,file:resource/static/
      cache:
        cachecontrol:
          max-age: 24H
  datasource:
    druid:
      # SQLite配置（默认）
      username: ${APP_DB_USERNAME:}
      password: ${APP_DB_PASSWORD:}
      # 初始连接数
      initialSize: 5
      # 最小连接池数量
      minIdle: 10
      # 最大连接池数量
      maxActive: 20
      # 配置获取连接等待超时的时间
      maxWait: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      timeBetweenEvictionRunsMillis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      minEvictableIdleTimeMillis: 300000
      # 配置一个连接在池中最大生存的时间，单位是毫秒
      maxEvictableIdleTimeMillis: 900000
      # 配置检测连接是否有效
      validationQuery: SELECT 1
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      webStatFilter:
        enabled: true
      statViewServlet:
        enabled: true
        # 设置白名单，不填则允许所有访问
        allow:
        url-pattern: /druid/*
        # 控制台管理用户名和密码
        login-username: ruoyi
        login-password: 123456
      filter:
        stat:
          enabled: true
          # 慢SQL记录
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: f7a3b6e4c1d2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9ea0fb1c2d3e4f5a6b7c8d9ea0fb1c2d3e4f5a6b7c8d9ea0fb1c2d3e4f5a6b7c8d9ea0fb1c2d3e4f5a6b7c8d9ea0fb1c2d3e4f5a6b7c8d9ea0fb1c2d3e4f5a6b7c8d9ea0fb1c2d3e4f5a6b7c8d9ea0fb1c2d3e4f5a6b7c8d9ea0f
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis Plus配置
mybatis-plus:
  # 搜索指定包别名
  typeAliasesPackage: io.charles.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mybatis/**/*Mapper.xml,classpath*:mapper/**/*.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml
  # 注册全局 TypeHandler（处理 LocalDateTime 多数据库兼容）
  typeHandlersPackage: io.charles.framework.config.typehandler
  # 全局配置
  global-config:
    db-config:
      # 主键策略：自增
      id-type: auto

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# 代码生成
gen:
  # 作者
  author: charles
  # 默认生成包路径 system 需改成自己的模块名称 如 system monitor tool
  packageName: io.charles.project.system
  # 自动去除表前缀，默认是true
  autoRemovePre: false
  # 表前缀（生成类名不会包含表前缀，多个用逗号分隔）
  tablePrefix: sys_

# -----------------------------
# Xenon Configurations
# -----------------------------
xenon:
  data-dir: data/xenon
  tile-cache:
    enabled: true
    dir: data/tile-cache
  services:
    wms:
      enabled: true
    wfs:
      enabled: true
    wmts:
      enabled: true
      cache-enabled: true
    wcs:
      enabled: true
